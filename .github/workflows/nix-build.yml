name: Nix Build

on:
  workflow_call:
    inputs:
      head_sha:
        type: string
        required: true
        description: "ref of the branch"
      number_of_commits:
        type: number
        required: false
        default: -1
      run_format_check:
        type: boolean
        required: false
        default: false
  workflow_dispatch:
    inputs:
      head_sha:
        type: string
        required: false
        description: "ref of the branch"

permissions:
  contents: read
  id-token: write

jobs:
  nix-build:
    name: "Nix Build"
    timeout-minutes: 90
    runs-on: [ ubuntu-latest ]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.head_sha || github.sha }}
          fetch-depth: 0
          submodules: recursive
          persist-credentials: false

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-flakehub: false
          use-gha-cache: true

      - name: Check formatting via Nix
        if: ${{ inputs.run_format_check }}
        env:
          DISTANCE_MERGE_BASE: ${{ inputs.number_of_commits }}
          GH_TOKEN: ${{ github.token }}
        run: nix run .#format -- --check

      - name: Restore ccache
        id: restore-ccache
        uses: actions/cache/restore@v4
        with:
          path: .ccache
          key: ${{ runner.os }}-nix-ccache-${{ hashFiles('flake.lock') }}-${{ github.job }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-nix-ccache-${{ hashFiles('flake.lock') }}-
            ${{ runner.os }}-nix-ccache-

      - name: Configure via devShell
        run: |
          ./.nix/nix-cmake.sh -DCMAKE_BUILD_TYPE=Debug -G Ninja -S . -B cmake-build-nix

      - name: Build via devShell
        run: |
          ./.nix/nix-run.sh ccache --show-stats
          ./.nix/nix-cmake.sh --build cmake-build-nix -j"$(nproc)" -- -k 0
          ./.nix/nix-run.sh ccache --show-stats

      - name: Save ccache
        if: ${{ steps.restore-ccache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v4
        continue-on-error: true
        with:
          path: .ccache
          key: ${{ steps.restore-ccache.outputs.cache-primary-key }}

      - name: Run Unit Tests via devShell
        run: |
          source .github/.env/test-none.env
          ./.nix/nix-run.sh ctest --test-dir cmake-build-nix -j -LE "Systest|DockerCompose" --output-on-failure --output-junit cmake-build-nix/junit-unit.xml --timeout 2400 ${ADDITIONAL_CTEST_ARGS}

      - name: Run system tests via devShell
        run: |
          source .github/.env/test-none.env
          ./.nix/nix-run.sh ctest --test-dir cmake-build-nix -j -L Systest --output-on-failure --output-junit cmake-build-nix/junit-systest.xml --timeout 4800 ${ADDITIONAL_CTEST_ARGS}

      - name: Upload build artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: nix-build-logs
          path: |
            cmake-build-nix/CMakeFiles/CMakeOutput.log
            cmake-build-nix/CMakeFiles/CMakeError.log
          retention-days: 7
